<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Style Game Finder</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1b2838;
  color: #c7d5e0;
}

/* HEADER */
header {
  background:#171a21;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#66c0f4;
  border-bottom:1px solid #2a475e;
}

/* BUSCA */
.search-box {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:25px;
  background:#16202d;
}

.search-box input {
  padding:12px;
  width:350px;
  border:none;
  border-radius:4px;
  background:#2a475e;
  color:white;
  font-size:16px;
}

.search-box button {
  padding:12px 18px;
  background:#66c0f4;
  border:none;
  border-radius:4px;
  font-weight:bold;
  cursor:pointer;
}

.search-box button:hover {
  background:#417a9b;
}

/* GRID lado a lado */
.results {
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:20px;
}

/* CARD */
.card {
  background:#16202d;
  border-radius:8px;
  padding:15px;
  transition:0.2s;
  cursor:pointer;
}

.card:hover {
  background:#1f2f44;
  transform:translateY(-4px);
}

/* IMAGEM 16:9 REAL */
.thumb-container {
  width:100%;
  aspect-ratio:16 / 9;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  overflow:hidden;
  margin-bottom:12px;
}

.thumb-container img {
  max-width:100%;
  max-height:100%;
  object-fit:contain; /* NÃO estica */
}

/* INFO */
.card h3 {
  font-size:18px;
  margin-bottom:8px;
  color:#fff;
}

.price {
  font-size:16px;
  font-weight:bold;
  color:#a4d007;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  padding:30px;
}

.modal-content {
  background:#16202d;
  width:800px;
  max-width:95%;
  border-radius:8px;
  padding:25px;
  position:relative;
}

.modal-close {
  position:absolute;
  top:15px;
  right:20px;
  font-size:26px;
  color:#66c0f4;
  cursor:pointer;
}

/* Banner 16:9 */
.modal-banner {
  width:100%;
  aspect-ratio:16 / 9;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  overflow:hidden;
  margin-bottom:20px;
}

.modal-banner img {
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.steam-btn {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:#5c7e10;
  color:white;
  text-decoration:none;
  font-weight:bold;
  border-radius:4px;
}

.steam-btn:hover {
  background:#6ea512;
}

a {
  all: unset;
  cursor: pointer; /* opcional, mantém o comportamento de clique */
}
</style>
</head>

<body>

<header>
	<a href="index.html">Steam Deals Finder</a>
</header>

<div class="search-box">
  <input type="text" id="gameInput" placeholder="Digite nome do jogo...">
  <button id="searchBtn">Buscar</button>
</div>

<div class="results" id="results"></div>

<div class="modal" id="gameModal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const searchBtn = document.getElementById("searchBtn");
const gameInput = document.getElementById("gameInput");
const resultsContainer = document.getElementById("results");
const modal = document.getElementById("gameModal");
const modalContent = document.getElementById("modalContent");

searchBtn.addEventListener("click", searchGames);
gameInput.addEventListener("keydown", e => {
  if(e.key === "Enter") searchGames();
});

async function searchGames(){
  const query = gameInput.value.trim();
  if(!query) return alert("Digite algo!");

  resultsContainer.innerHTML = "Carregando...";

  try {
    const res = await fetch(`https://www.cheapshark.com/api/1.0/games?title=${encodeURIComponent(query)}`);
    const games = await res.json();

    if(!games.length){
      resultsContainer.innerHTML = "Nenhum jogo encontrado.";
      return;
    }

    resultsContainer.innerHTML = "";

    games.forEach(game => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="thumb-container">
          <img src="${game.thumb}" alt="${game.external}">
        </div>
        <h3>${game.external}</h3>
        <div class="price">$${game.cheapest}</div>
      `;

      card.onclick = () => openGameModal(game.gameID);
      resultsContainer.appendChild(card);
    });

  } catch {
    resultsContainer.innerHTML = "Erro ao buscar jogos.";
  }
}

async function openGameModal(gameID){
  modal.style.display = "flex";
  modalContent.innerHTML = "Carregando...";

  try {
    const res = await fetch(`https://www.cheapshark.com/api/1.0/games?id=${gameID}`);
    const data = await res.json();

    let steamButton = "";
    if(data.info.steamAppID){
      steamButton = `
        <a class="steam-btn"
           href="https://store.steampowered.com/app/${data.info.steamAppID}"
           target="_blank">
           Ver na Steam
        </a>
      `;
    }

    modalContent.innerHTML = `
      <span class="modal-close" onclick="document.getElementById('gameModal').style.display='none'">&times;</span>
      <div class="modal-banner">
        <img src="${data.info.thumb}" alt="${data.info.title}">
      </div>
      <h2>${data.info.title}</h2>
      <p><strong>Menor preço histórico:</strong> $${data.cheapestPriceEver.price}</p>
      <p><strong>Lançamento:</strong> ${data.info.releaseDate || "Desconhecido"}</p>
      ${steamButton}
    `;

  } catch {
    modalContent.innerHTML = "Erro ao carregar detalhes.";
  }
}

modal.addEventListener("click", e => {
  if(e.target === modal) modal.style.display = "none";
});
</script>

</body>
</html>
