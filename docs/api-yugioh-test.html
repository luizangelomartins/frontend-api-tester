<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yu-Gi-Oh Card Library</title>

<!-- FAVICON -->
<link rel="icon" href="./icons/favicon.ico" type="image/x-icon">
	
<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,Helvetica,sans-serif;
background:#0b0b12;
color:#e6e6f0;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 40px;
background:linear-gradient(90deg,#120c1f,#1c1333);
border-bottom:2px solid #d4af37;
}

header h1{
color:#d4af37;
font-size:26px;
letter-spacing:1px;
}

/* SEARCH */

.search-box{
padding:25px 40px;
background:#141022;
}

.search-box input{
padding:12px;
width:260px;
border-radius:4px;
border:none;
background:#1c1630;
color:white;
}

.search-box input:focus{
outline:none;
box-shadow:0 0 8px rgba(212,175,55,.5);
}

.search-box button{
padding:12px 16px;
margin-left:6px;
border:none;
border-radius:4px;
background:linear-gradient(45deg,#d4af37,#f1d67a);
color:#111;
font-weight:bold;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:18px;
padding:30px 40px;
max-width:1400px;
margin:auto;
}

/* CARD */

.card{
position:relative;
cursor:pointer;
overflow:hidden;
border-radius:6px;
transition:transform .25s, box-shadow .25s;
}

.card img{
width:100%;
display:block;
border-radius:6px;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(0,0,0,.9);
z-index:5;
}

/* TITLE OVERLAY */

.card-title{
position:absolute;
inset:0;
display:flex;
align-items:flex-end;
padding:14px;
opacity:0;
transition:opacity .25s;

background:linear-gradient(
to top,
rgba(0,0,0,.9) 10%,
rgba(0,0,0,.6) 40%,
rgba(0,0,0,0) 80%
);

font-size:15px;
font-weight:600;
color:#f1e7b5;
}

.card:hover .card-title{
opacity:1;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
justify-content:center;
align-items:center;
z-index:100;
padding:30px;
}

.modal-content{
background:#151028;
border-radius:10px;
max-width:900px;
width:100%;
overflow:hidden;
position:relative;
border:1px solid #2f2550;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

.close{
position:absolute;
top:15px;
right:20px;
font-size:28px;
cursor:pointer;
color:#d4af37;
}

/* HERO */

.hero{
display:flex;
gap:30px;
padding:30px;
}

.hero img{
width:240px;
border-radius:6px;
box-shadow:0 0 25px rgba(0,0,0,.9);
}

/* INFO */

.hero-info h2{
margin-bottom:10px;
color:#d4af37;
}

.hero-info p{
color:#ccc;
margin-bottom:8px;
line-height:1.5;
}

/* BADGES */

.badge{
display:inline-block;
background:#3b2d66;
padding:5px 9px;
border-radius:4px;
font-size:13px;
margin-right:6px;
}

/* STATS */

.stat{
display:inline-block;
background:#2a2145;
padding:6px 10px;
border-radius:4px;
margin-right:8px;
margin-top:6px;
border:1px solid #d4af37;
color:#f1e7b5;
}

@media(max-width:700px){

.hero{
flex-direction:column;
align-items:center;
text-align:center;
}

}

a {
  all: unset;
  cursor: pointer; /* opcional, mantém o comportamento de clique */
}
</style>
</head>

<body>

<header>
<h1>
	<a href="index.html">Yu-Gi-Oh Card Library</a>
</h1>
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Buscar carta...">
<button onclick="searchCard()">Buscar</button>
</div>

<div id="cardList" class="grid"></div>

<div id="cardModal" class="modal">
<div class="modal-content" id="modalContent">
<span class="close" onclick="closeModal()">&times;</span>
</div>
</div>

<script>

let currentResults=[];

async function searchCard(){

const query=document.getElementById("searchInput").value.trim();

if(!query){
alert("Digite o nome da carta");
return;
}

const list=document.getElementById("cardList");
list.innerHTML="Carregando...";

try{

const res=await fetch(
`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(query)}`
);

const data=await res.json();

currentResults=data.data||[];

renderList(currentResults);

}catch{

list.innerHTML="Erro ao buscar.";

}

}

function renderList(cards){

const list=document.getElementById("cardList");

list.innerHTML="";

if(!cards.length){

list.innerHTML="Nenhuma carta encontrada.";

return;

}

cards.forEach((card,index)=>{

const img=card.card_images?.[0]?.image_url||"";

list.innerHTML+=`

<div class="card" onclick="openModal(${index})">

<img src="${img}">

<div class="card-title">${card.name}</div>

</div>

`;

});

}

function openModal(index){

const card=currentResults[index];

const modal=document.getElementById("cardModal");
const content=document.getElementById("modalContent");

const img=card.card_images?.[0]?.image_url||"";

const badges=`
<span class="badge">${card.type}</span>
<span class="badge">${card.race}</span>
${card.attribute?`<span class="badge">${card.attribute}</span>`:""}
`;

content.innerHTML=`

<span class="close" onclick="closeModal()">&times;</span>

<div class="hero">

<img src="${img}">

<div class="hero-info">

<h2>${card.name}</h2>

<div>${badges}</div>

<p>

${card.level?`<span class="stat">Level ${card.level}</span>`:""}

${card.atk?`<span class="stat">ATK ${card.atk}</span>`:""}

${card.def?`<span class="stat">DEF ${card.def}</span>`:""}

</p>

<p>${card.desc}</p>

</div>

</div>

`;

modal.style.display="flex";

}

function closeModal(){

document.getElementById("cardModal").style.display="none";

}

document.getElementById("cardModal").addEventListener("click",function(e){

if(e.target===this) closeModal();

});

document.getElementById("searchInput").addEventListener("keydown",function(e){

if(e.key==="Enter") searchCard();

});

</script>

</body>
</html>
