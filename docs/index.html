<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #00bcd4;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .menu a {
      text-decoration: none;
      padding: 15px 25px;
      background-color: #1e1e1e;
      border-radius: 10px;
      color: #ffffff;
      font-size: 18px;
      transition: 0.3s;
      border: 1px solid #333;
    }

    .menu a:hover {
      background-color: #00bcd4;
      color: #000;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Menu</h1>

    <div class="menu">
      <a href="api-pokemon-test.html">Pokedex</a>
    </div>
  </div>

</body>
</html>
