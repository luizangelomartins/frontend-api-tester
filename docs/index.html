<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>

  <!-- FAVICON -->
  <link rel="icon" href="./icons/favicon.ico" type="image/x-icon">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: #0f172a;
      color: #fff;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      padding: 20px;
      border-right: 1px solid #1e293b;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      color: #38bdf8;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu a {
      padding: 12px;
      text-decoration: none;
      color: #cbd5f5;
      border-radius: 8px;
      transition: 0.3s;
    }

    .menu a:hover {
      background: #38bdf8;
      color: #020617;
      transform: translateX(5px);
    }

    .content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .content img {
      max-width: 50%;
      max-height: 80%;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      opacity: 0;
      transition: 0.4s;
      padding: 5%;
    }

    .content img.active {
      opacity: 1;
    }

    .placeholder {
      color: #475569;
      font-size: 20px;
      position: absolute;
    }

    a {
      all: unset;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- MENU -->
  <div class="sidebar">
    <h2>
      <a href="https://github.com/luizangelomartins/frontend-api-tester">Menu</a>
    </h2>
    <div class="menu" id="menu"></div>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <span class="placeholder" id="placeholder">Passe o mouse no menu</span>
    <img id="preview" src="">
  </div>

  <script>
    function showImage(src) {
      const img = document.getElementById("preview");
      const placeholder = document.getElementById("placeholder");

      img.src = src;
      img.classList.add("active");

      if (placeholder) {
        placeholder.style.display = "none";
      }
    }

    async function carregarMenu() {
      const menu = document.getElementById("menu");

      try {
        const response = await fetch('./config/menu.json');

        if (!response.ok) {
          throw new Error('Erro HTTP: ' + response.status);
        }

        const itens = await response.json();

        itens.forEach(i => {
          if (!i.nome || !i.link || !i.imagem) return;

          const a = document.createElement('a');

          a.href = i.link;
          a.textContent = i.nome;

          a.addEventListener('mouseover', () => {
            showImage(i.imagem);
          });

          menu.appendChild(a);
        });

      } catch (erro) {
        console.error('Erro ao carregar menu:', erro);

        menu.innerHTML = `
          <span style="color:red;">
            Erro ao carregar menu
          </span>
        `;
      }
    }

    carregarMenu();
  </script>

</body>
</html>
