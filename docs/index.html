<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Pokédex</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Courier New', monospace;
  background:#0f0f20;
  color:#e5e5e5;
}

/* HEADER */
header{
  padding:20px 40px;
  background:#14142b;
  border-bottom:3px solid #ffcb05;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
header h1{
  color:#ffcb05;
  font-size:28px;
}

/* BUTTON SWITCH */
#layoutToggle{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  background:#ef4444;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SEARCH */
.search-box{
  display:flex;
  justify-content:center;
  padding:20px;
  background:#14142b;
}
.search-box input{
  padding:12px;
  width:260px;
  border-radius:6px;
  border:none;
  background:#1e1c33;
  color:white;
}
.search-box input:focus{
  outline:none;
  box-shadow:0 0 8px rgba(255,203,5,0.5);
}
.search-box button{
  padding:12px 16px;
  margin-left:6px;
  border:none;
  border-radius:6px;
  background:#ef4444;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* POKEDEX CONTAINER */
#pokedex{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:22px;
  padding:30px 40px;
  max-width:1400px;
  margin:auto;
}

/* POKEMON CARD */
.pokemon-card{
  background:#1e1c33;
  border-radius:12px;
  overflow:hidden;
  transition:transform .25s, box-shadow .25s;
  box-shadow:0 6px 18px rgba(0,0,0,.5);
}
.pokemon-card:hover{
  transform:translateY(-5px);
  box-shadow:0 12px 30px rgba(0,0,0,0.8);
}

/* SPRITE */
.pokemon-sprite{
  background:#11121f;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}
.pokemon-sprite img{
  width:180px;
}

/* INFO */
.pokemon-info{
  padding:20px;
}
.pokemon-info h2{
  color:#ffcb05;
  text-transform:capitalize;
  margin-bottom:10px;
}
.types{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.type-badge{
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  text-transform:capitalize;
  color:#111;
}
.type-fire{background:#f87171;}
.type-water{background:#60a5fa;}
.type-grass{background:#4ade80;}
.type-electric{background:#facc15;}
.type-ice{background:#38bdf8;}
.type-fighting{background:#f97316;}
.type-poison{background:#c084fc;}
.type-ground{background:#eab308;}
.type-flying{background:#a5b4fc;}
.type-psychic{background:#f472b6;}
.type-bug{background:#84cc16;}
.type-rock{background:#a78bfa;}
.type-ghost{background:#818cf8;}
.type-dark{background:#475569;}
.type-dragon{background:#6366f1;}
.type-steel{background:#94a3b8;}
.type-fairy{background:#f9a8d4;}
.type-normal{background:#9ca3af;}

/* STATS */
.stats{
  margin-top:10px;
}
.stat{
  margin-bottom:6px;
}
.stat-name{
  display:inline-block;
  width:80px;
}
.stat-bar{
  display:inline-block;
  height:12px;
  width:150px;
  background:#333;
  border-radius:6px;
  overflow:hidden;
  vertical-align:middle;
}
.stat-bar-fill{
  height:100%;
  background:#ffcb05;
  border-radius:6px;
}

/* NAVIGATION */
.nav-buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px 0;
}
.nav-buttons button{
  padding:12px 20px;
  border:none;
  border-radius:6px;
  background:#ef4444;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* ÚNICO MODO */
#pokedex.single{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* RESPONSIVE */
@media(max-width:700px){
  #pokedex{
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  }
}
</style>
</head>

<body>

<header>
  <h1>Interactive Pokédex</h1>
  <button id="layoutToggle" onclick="toggleLayout()">Alternar Grid / Único</button>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Buscar Pokémon...">
  <button onclick="searchPokemon()">Buscar</button>
</div>

<div id="pokedex"></div>

<div class="nav-buttons" id="navButtons" style="display:none;">
  <button onclick="prevPokemon()">← Anterior</button>
  <button onclick="nextPokemon()">Próximo →</button>
</div>

<script>
let allPokemon=[];
let currentResults=[];
let currentIndex=0;
let singleMode=false;

// Carrega lista base
async function loadPokemon(){
  const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=300");
  const data = await res.json();
  allPokemon = data.results;
}
loadPokemon();

// Busca Pokémon
async function searchPokemon(){
  const query=document.getElementById("searchInput").value.toLowerCase().trim();
  if(!query){alert("Digite um Pokémon"); return;}
  const filtered = allPokemon.filter(p=>p.name.includes(query)).slice(0,50);
  currentResults=[];
  for(const p of filtered){
    const res=await fetch(p.url);
    currentResults.push(await res.json());
  }
  currentIndex=0;
  renderPokedex();
}

// Alterna layout
function toggleLayout(){
  singleMode=!singleMode;
  const pdx = document.getElementById("pokedex");
  const nav = document.getElementById("navButtons");
  if(singleMode){
    pdx.classList.add("single");
    nav.style.display="flex";
  }else{
    pdx.classList.remove("single");
    nav.style.display="none";
  }
  renderPokedex();
}

// Renderiza pokedex
function renderPokedex(){
  const pdx = document.getElementById("pokedex");
  pdx.innerHTML="";
  if(!currentResults.length) return;

  if(singleMode){
    renderSingle(currentResults[currentIndex]);
  }else{
    currentResults.forEach(p=>renderCard(p));
  }
}

// Renderiza card individual
function renderCard(p){
  const pdx = document.getElementById("pokedex");
  const types = p.types.map(t=>`<span class="type-badge type-${t.type.name}">${t.type.name}</span>`).join("");
  const stats = p.stats.map(s=>{
    const percent = Math.min(s.base_stat,255)/255*100;
    return `<div class="stat"><span class="stat-name">${s.stat.name}</span>
    <div class="stat-bar"><div class="stat-bar-fill" style="width:${percent}%"></div></div></div>`;
  }).join("");
  pdx.innerHTML += `
    <div class="pokemon-card">
      <div class="pokemon-sprite">
        <img src="${p.sprites.other['official-artwork'].front_default}" alt="${p.name}">
      </div>
      <div class="pokemon-info">
        <h2>${p.name}</h2>
        <div class="types">${types}</div>
        <p>Altura: ${p.height} | Peso: ${p.weight}</p>
        <div class="stats">${stats}</div>
      </div>
    </div>
  `;
}

// Renderiza único Pokémon
function renderSingle(p){
  const pdx = document.getElementById("pokedex");
  const types = p.types.map(t=>`<span class="type-badge type-${t.type.name}">${t.type.name}</span>`).join("");
  const stats = p.stats.map(s=>{
    const percent = Math.min(s.base_stat,255)/255*100;
    return `<div class="stat"><span class="stat-name">${s.stat.name}</span>
    <div class="stat-bar"><div class="stat-bar-fill" style="width:${percent}%"></div></div></div>`;
  }).join("");
  pdx.innerHTML = `
    <div class="pokemon-card">
      <div class="pokemon-sprite">
        <img src="${p.sprites.other['official-artwork'].front_default}" alt="${p.name}">
      </div>
      <div class="pokemon-info">
        <h2>${p.name}</h2>
        <div class="types">${types}</div>
        <p>Altura: ${p.height} | Peso: ${p.weight}</p>
        <div class="stats">${stats}</div>
      </div>
    </div>
  `;
}

// Navegação único
function nextPokemon(){
  if(currentResults.length===0) return;
  currentIndex=(currentIndex+1)%currentResults.length;
  renderPokedex();
}
function prevPokemon(){
  if(currentResults.length===0) return;
  currentIndex=(currentIndex-1+currentResults.length)%currentResults.length;
  renderPokedex();
}

document.getElementById("searchInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") searchPokemon();
});
</script>

</body>
</html>
