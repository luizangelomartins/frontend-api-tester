<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: #0f172a;
      color: #fff;
    }

    /* MENU LATERAL */
    .sidebar {
      width: 220px;
      background: #020617;
      padding: 20px;
      border-right: 1px solid #1e293b;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      color: #38bdf8;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu a {
      padding: 12px;
      text-decoration: none;
      color: #cbd5f5;
      border-radius: 8px;
      transition: 0.3s;
      position: relative;
    }

    .menu a:hover {
      background: #38bdf8;
      color: #020617;
      transform: translateX(5px);
    }

    /* ÁREA PRINCIPAL */
    .content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .content img {
      max-width: 50%;
    max-height: 80%;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    opacity: 0;
    transition: 0.4s;
    padding: 5%;
    }

    .content img.active {
      opacity: 1;
    }

    .placeholder {
      color: #475569;
      font-size: 20px;
      position: absolute;
    }

  </style>
</head>
<body>

  <!-- MENU -->
  <div class="sidebar">
    <h2>Menu</h2>

    <div class="menu">
      <a href="api-pokemon-test.html"
         onmouseover="showImage('img/pokemon.svg')">
         Pokedex
      </a>

      <a href="api-games-test.html"
         onmouseover="showImage('img/games.avif')">
         Games
      </a>

      <a href="api-yugioh-test.html"
         onmouseover="showImage('img/yugioh.png')">
         Yu Gi Oh
      </a>
	  
	  <a href="api-anime-test.html"
         onmouseover="showImage('img/animes.webp')">
         Animê
      </a>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <img id="preview" src="">
  </div>

  <script>
    function showImage(src) {
      const img = document.getElementById("preview");
      img.src = src;
      img.classList.add("active");
    }
  </script>

</body>
</html>
